services:
  - type: web
    name: parq-api
    env: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm -r --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && pnpm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
